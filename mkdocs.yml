site_name: "Geospatial Harmonization with LLMs"
site_description: "A template for using LLMs to harmonize environmental science datasets"
site_url: "https://cu-esiil.github.io/LLM_lesson_exemplar/"

repo_name: "CU-ESIIL/LLM_lesson_exemplar"
repo_url: "https://github.com/CU-ESIIL/LLM_lesson_exemplar"
edit_uri: "edit/main/docs/"

hooks:
  - hooks.py

nav:
  - Site:
      - Home: index.md
  - Examples:
      - Colorado Fire Risk: examples/colorado_fire_risk.md
  - Reference:
      - API Reference: examples.md

theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.png
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
