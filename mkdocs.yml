site_name: "Geospatial Harmonization with LLMs"
site_description: "A template for using LLMs to harmonize environmental science datasets"
site_url: "https://cu-esiil.github.io/LLM_lesson_exemplar/"

repo_name: "link to repository"
repo_url: "https://github.com/CU-ESIIL/LLM_lesson_exemplar"
edit_uri: "edit/main/docs/"

hooks:
  - hooks.py

nav:
  - Home: index.md
  - Quick Start: start-here.md
  - Run on CyVerse: cyverse.md
  - LLM Guide:
      - Lesson Slides: slides.md
      - Available Models: available-models.md
      - Agents and Systems: agents-and-systems.md
      - LLM Hosting and Data Centers: ai-infrastructure/llm-hosting-data-centers.md
      - Developer Documentation: developer-docs.md
  - Bring Your Own Data: provide-your-own-data-sources.md

theme:
  name: material
  logo: assets/llm_logo.png
  favicon: assets/esiil_content/favicon.png
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
  toc:
    integrate: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/javascripts/lesson-slides.js
  - assets/javascripts/cyverse-toc.js
  - assets/javascripts/site-links.js

plugins:
  - search
