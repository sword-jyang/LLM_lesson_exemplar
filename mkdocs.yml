site_name: "Geospatial Harmonization with LLMs"
site_description: "A template for using LLMs to harmonize environmental science datasets"
site_url: "https://cu-esiil.github.io/LLM_lesson_exemplar/"

repo_name: "CU-ESIIL/LLM_lesson_exemplar"
repo_url: "https://github.com/CU-ESIIL/LLM_lesson_exemplar"
edit_uri: "edit/main/docs/"

nav:
  - Site:
      - Home: index.md
      - Examples: examples.md

theme:
  name: material
  logo: assets/esiil_content/esiil_oasis_logo.png
  favicon: assets/esiil_content/favicon.ico
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
